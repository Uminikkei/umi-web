<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .stamp{fill:none;stroke:#f0ebe0;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#f0ebe0}
      .txt{font-family:Arial Black, Impact, sans-serif;font-weight:900;letter-spacing:10px;fill:#f0ebe0}
      .dist{opacity:.22}
    </style>
    <path id="topArc" d="M 315 385 A 285 285 0 0 1 885 385"/>
    <path id="bottomArc" d="M 885 815 A 285 285 0 0 1 315 815"/>
  </defs>

  <!-- círculos exteriores más cerrados -->
  <circle class="stamp" cx="600" cy="570" r="405" stroke-width="34"/>
  <circle class="stamp" cx="600" cy="570" r="365" stroke-width="10"/>
  <circle class="stamp" cx="600" cy="570" r="288" stroke-width="12"/>

  <!-- arcos interiores -->
  <path class="stamp" d="M390 430 A230 230 0 0 1 810 430" stroke-width="15"/>
  <path class="stamp" d="M410 705 A220 220 0 0 0 790 705" stroke-width="15"/>

  <!-- texto curvo -->
  <text class="txt" font-size="78">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">- COCINA -</textPath>
  </text>
  <text class="txt" font-size="74">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">- PREMIUM -</textPath>
  </text>

  <!-- centro -->
  <g transform="rotate(-8 600 570)">
    <text x="600" y="610" text-anchor="middle" class="txt" font-size="170" letter-spacing="6">NIKKEI</text>
  </g>

  <!-- estrellas internas -->
  <g class="fill">
    <text x="600" y="385" text-anchor="middle" class="txt" font-size="70" letter-spacing="18">★★★</text>
    <text x="600" y="735" text-anchor="middle" class="txt" font-size="48" letter-spacing="16">★★★★★</text>
  </g>

  <!-- estrellas exteriores cercanas sin tocar el círculo -->
  <g class="fill" font-family="Arial Black, Impact, sans-serif" font-size="88" text-anchor="middle">
    <text x="310" y="995">★</text>
    <text x="455" y="1070">★</text>
    <text x="600" y="1105">★</text>
    <text x="745" y="1070">★</text>
    <text x="890" y="995">★</text>
  </g>

  <!-- textura vintage simple -->
  <g class="dist" fill="#fff">
    <circle cx="302" cy="240" r="9"/><circle cx="450" cy="210" r="5"/><circle cx="850" cy="260" r="8"/>
    <circle cx="270" cy="520" r="6"/><circle cx="910" cy="540" r="5"/><circle cx="600" cy="304" r="7"/>
    <rect x="240" y="410" width="120" height="9" transform="rotate(-20 300 414)"/>
    <rect x="700" y="470" width="170" height="8" transform="rotate(16 785 474)"/>
    <rect x="430" y="590" width="110" height="10" transform="rotate(-28 485 595)"/>
    <rect x="585" y="615" width="160" height="8" transform="rotate(20 665 619)"/>
    <rect x="300" y="725" width="90" height="8" transform="rotate(10 345 729)"/>
    <rect x="770" y="755" width="105" height="9" transform="rotate(-22 822 759)"/>
    <circle cx="520" cy="510" r="6"/><circle cx="645" cy="575" r="8"/><circle cx="730" cy="620" r="5"/>
    <circle cx="475" cy="710" r="5"/><circle cx="684" cy="805" r="7"/><circle cx="365" cy="852" r="6"/>
  </g>
</svg>
