       C 21,38 32,25 48,23
       C 64,21 75,32 75,48
       C 75,64 64,73 48,71
       C 32,69 25,57 29,43
       C 33,30 45,24 56,28
       C 67,32 71,44 67,54
       C 63,64 52,69 43,65"
    fill="none"
    stroke="#00d4f0"
    stroke-width="6.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Punto central de la espiral -->
  <circle cx="43" cy="64" r="5" fill="#00d4f0"/>
