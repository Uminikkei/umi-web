<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="to-teal" color-interpolation-filters="sRGB">
      <feFlood flood-color="#62CAE3" result="teal"/>
      <feComposite in="teal" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- Isotipo UMI en teal sobre fondo transparente -->
  <image href="logo-umi-icon.png"
         x="5" y="5" width="90" height="90"
         preserveAspectRatio="xMidYMid meet"
         filter="url(#to-teal)"/>
</svg>
