<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UMI Pedidos</title>
<meta name="description" content="Pedidos internos de compras — UMI Nikkei Bar">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0d1b3e">
<link rel="manifest" href="/pedidos/manifest.json">
<link rel="icon" type="image/png" href="/pedidos/icon-192.png">
<link rel="apple-touch-icon" href="/pedidos/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UMI Pedidos">
<link rel="stylesheet" href="/pedidos/pedidos.css?v=9">
</head>
<body>

<!-- ══════════ GATE: ingreso con PIN ══════════ -->
<div class="gate" id="gate">
  <div class="gate-box">
    <img src="/pedidos/icon-192.png" alt="UMI" class="gate-logo">
    <h1>UMI Pedidos</h1>
    <p class="gate-sub">Ingresa tu PIN de área</p>
    <input type="password" id="pinInput" inputmode="numeric" autocomplete="off" maxlength="6" placeholder="• • • •">
    <button class="btn-primary" id="pinBtn">Entrar</button>
    <div class="gate-err" id="pinErr"></div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div class="app" id="app" style="display:none">

  <header class="topbar">
    <div class="tb-left">
      <img src="/pedidos/icon-192.png" alt="" class="tb-logo">
      <div>
        <div class="tb-area" id="tbArea">—</div>
        <div class="tb-fecha" id="tbFecha">—</div>
      </div>
    </div>
    <button class="tb-salir" id="btnSalir">Salir</button>
  </header>

  <!-- Tabs -->
  <nav class="tabs" id="tabs"></nav>

  <!-- ── VISTA PEDIDOR: armar pedido ── -->
  <section class="vista" id="vistaPedir" style="display:none">
    <div class="buscador-wrap">
      <input type="search" id="buscador" placeholder="Buscar producto…" autocomplete="off">
    </div>
    <div id="listaCatalogo" class="catalogo"></div>
    <button class="btn-agregar-prod" id="btnNuevoProd">＋ Agregar producto que no está en la lista</button>
    <div class="carrito-espacio"></div>
  </section>

  <!-- Barra flotante del carrito -->
  <div class="carrito-bar" id="carritoBar" style="display:none">
    <div class="cb-info" id="cbInfo">0 productos</div>
    <button class="btn-primary cb-btn" id="btnEnviar">Enviar pedido</button>
  </div>

  <!-- ── VISTA PEDIDOR: mis pedidos enviados ── -->
  <section class="vista" id="vistaEnviados" style="display:none">
    <div id="listaEnviados"></div>
  </section>

  <!-- ── VISTA COMPRADOR: pedidos por día ── -->
  <section class="vista" id="vistaCompras" style="display:none">
    <div class="buscador-simple">
      <input type="search" id="buscadorCompras" placeholder="Buscar en los pedidos…" autocomplete="off">
    </div>
    <div id="listaCompras"></div>
  </section>

  <!-- ── VISTA INVENTARIO (todos los roles) ── -->
  <section class="vista" id="vistaInventario" style="display:none">
    <div class="buscador-simple">
      <input type="search" id="buscadorInv" placeholder="Buscar producto…" autocomplete="off">
    </div>
    <div id="invSugerido"></div>
    <div id="listaInventario"></div>
  </section>

  <!-- ── VISTA ADMIN: registro de movimientos ── -->
  <section class="vista" id="vistaRegistro" style="display:none">
    <div class="buscador-simple">
      <input type="search" id="buscadorReg" placeholder="Buscar en el registro… (área o producto)" autocomplete="off">
    </div>
    <div id="listaRegistro"></div>
  </section>

  <!-- ── VISTA COMPRADOR: catálogo ── -->
  <section class="vista" id="vistaCatalogo" style="display:none">
    <div class="buscador-simple">
      <input type="search" id="buscadorCatalogo" placeholder="Buscar producto…" autocomplete="off">
    </div>
    <button class="filtro-chip" id="btnSinCosto">⚠️ Solo sin costo</button>
    <button class="btn-agregar-prod" id="btnNuevoProd2" style="margin-top:.6rem">＋ Agregar producto</button>
    <div id="listaCatalogoAdmin"></div>
  </section>

  <!-- ── VISTA ADMIN: clientes registrados (requiere login Google admin) ── -->
  <section class="vista" id="vistaClientes" style="display:none">
    <div id="clientesAuth"></div>
    <div class="buscador-simple" id="clientesBuscarWrap" style="display:none">
      <input type="search" id="buscadorClientes" placeholder="Buscar cliente (nombre, correo, teléfono)…" autocomplete="off">
    </div>
    <div id="clientesResumen" class="clientes-resumen"></div>
    <div id="listaClientes"></div>
  </section>

</div>

<!-- ── MODAL: confirmar envío ── -->
<div class="modal" id="modalEnviar">
  <div class="modal-bg" data-cerrar></div>
  <div class="modal-box">
    <h3>Confirmar pedido</h3>
    <div class="modal-lista" id="resumenPedido"></div>
    <textarea id="notaPedido" placeholder="Nota para el comprador (opcional)…" rows="2"></textarea>
    <div class="modal-acciones">
      <button class="btn-sec" data-cerrar>Seguir editando</button>
      <button class="btn-primary" id="btnConfirmarEnvio">Enviar ✓</button>
    </div>
  </div>
</div>

<!-- ── MODAL: nuevo producto ── -->
<div class="modal" id="modalProducto">
  <div class="modal-bg" data-cerrar></div>
  <div class="modal-box">
    <h3>Nuevo producto</h3>
    <label class="campo"><span>Nombre</span><input type="text" id="npNombre" placeholder="Ej: Palta" autocomplete="off"></label>
    <label class="campo"><span>Categoría</span><select id="npCategoria"></select></label>
    <label class="campo"><span>Unidad</span><select id="npUnidad"></select></label>
    <div class="gate-err" id="npErr"></div>
    <div class="modal-acciones">
      <button class="btn-sec" data-cerrar>Cancelar</button>
      <button class="btn-primary" id="btnGuardarProd">Guardar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: costo y proveedor (solo Compras / Administrador) ── -->
<div class="modal" id="modalCosto">
  <div class="modal-bg" data-cerrar></div>
  <div class="modal-box">
    <h3>Costo y proveedor</h3>
    <p class="costo-sub" id="costoProducto"></p>
    <label class="campo"><span>Costo en pesos (con IVA dentro del monto)</span><input type="number" id="costoValor" inputmode="numeric" min="0" placeholder="Ej: 8990"></label>
    <label class="campo"><span>Proveedor</span><input type="text" id="costoProveedor" placeholder="Ej: Bombo, Macan, Luigi…" autocomplete="off"></label>
    <label class="campo"><span>Stock mínimo (para el pedido sugerido; 0 = sin mínimo)</span><input type="number" id="costoMinimo" inputmode="decimal" min="0" step="0.5" placeholder="Ej: 10"></label>
    <label class="campo"><span>Unidad de conteo del inventario (si difiere de la de compra, ej: se compra en kg pero se cuenta en porciones)</span><select id="costoUnidadInv"></select></label>
    <div class="gate-err" id="costoErr"></div>
    <div class="modal-acciones">
      <button class="btn-sec" data-cerrar>Cancelar</button>
      <button class="btn-primary" id="btnGuardarCosto">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/pedidos/pedidos.js?v=13"></script>
</body>
</html>
